openapi: 3.0.3
info:
  title: Lena API (Teacher Actions Only)
  version: 1.0.0
paths:
  /v1/activities:
    post:
      operationId: Create Activity
      description: Create a new assignment
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: Token used to authenticate <b>teacher</b>
        required: true
      tags:
      - activities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivity'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateActivity'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateActivity'
          description: ''
  /v1/activities/{id}:
    put:
      operationId: Update Activity
      description: Update an activity by id
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: Token used to authenticate <b>teacher</b>
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this activity.
        required: true
      tags:
      - activities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActivity'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateActivity'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateActivity'
          description: ''
    patch:
      operationId: Update Activity (Partial)
      description: Update an activity by id
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: Token used to authenticate <b>teacher</b>
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this activity.
        required: true
      tags:
      - activities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateActivity'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateActivity'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
          description: ''
    delete:
      operationId: Delete Activity
      description: Delete an activity
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: Token used to authenticate <b>teacher</b>
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this activity.
        required: true
      tags:
      - activities
      responses:
        '204':
          description: No response body
